<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>aryan</title>

<style>
:root{
  --bg:#111212;
  --green:rgba(79,192,141,.5);
}

*{
  box-sizing:border-box;
}

body{
  min-height:100vh;
  margin:0;
  padding:0 10vw;

  display:flex;
  align-items:center;

  background:var(--bg);
  color:white;

  font-family:
  "Rubik",
  -apple-system,
  BlinkMacSystemFont,
  "Segoe UI",
  Roboto,
  sans-serif;

  font-size:16px;
  -webkit-font-smoothing:antialiased;
}

main{
  max-width:650px;
}

h1{
  display:flex;
  align-items:center;

  margin:0 0 .3em;

  font-size:3rem;
  font-weight:500;
  line-height:1;
}

.cursor{
  display:inline-block;

  height:.8em;
  margin-left:3px;

  border-right:2px solid white;

  animation:blink .8s step-end infinite;
}

@keyframes blink{
  50%{
    border-color:transparent;
  }
}

p{
  max-width:32em;
  margin:1.2em 0;

  font-size:1.2rem;
  font-weight:300;
  line-height:1.5;
}

a{
  position:relative;
  color:white;
  text-decoration:none;
}

a::after{
  content:"";

  position:absolute;
  left:0;
  right:0;
  bottom:0;

  height:.35em;

  z-index:-1;

  transition:.2s;
}

a:hover::after{
  height:100%;
}

.green::after{
  background:var(--green);
}

footer{
  position:fixed;

  bottom:20px;
  left:10vw;

  color:rgba(255,255,255,.5);

  font-size:.85rem;
  font-weight:300;
}
</style>

</head>

<body>

<main>

<h1>
<span id="text"></span><span class="cursor"></span>
</h1>

<p>
My name is <a class="green" href="https://www.linkedin.com/in/aryan-kalra-5b0920249/" target="_blank">Aryan</a>.
</p>

<p>
I have a degree in computer science.
</p>

<p>
That's basically it.
</p>

</main>

<footer>
Created 2023. Last updated 2026.
</footer>

<script>
const text = "Hi,";
const output = document.getElementById("text");

let index = 0;

function type(){
  if(index < text.length){
    output.textContent += text[index];
    index++;
    setTimeout(type,500);
  }
}

setTimeout(type,500);
</script>

</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <title>aryan</title>

    <style>
      :root {
        --bg: #111212;
        --green: rgba(79, 192, 141, 0.5);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        padding: 0 10vw;

        display: flex;
        align-items: center;

        background: var(--bg);
        color: white;

        font-family:
          "Rubik",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;

        font-size: 16px;
        -webkit-font-smoothing: antialiased;
      }

      main {
        max-width: 650px;
      }

      h1 {
        display: flex;
        align-items: center;

        margin: 0 0 0.3em;

        font-size: 3rem;
        font-weight: 500;
        line-height: 1;
      }

      .cursor {
        display: inline-block;

        height: 0.8em;
        margin-left: 3px;

        border-right: 1px solid white;

        transform: scaleY(1.4);

        animation: blink 0.8s step-end infinite;
      }

      @keyframes blink {
        50% {
          border-color: transparent;
        }
      }

      p {
        max-width: 32em;
        margin: 1.2em 0;

        font-size: 1.2rem;
        font-weight: 300;
        line-height: 1.5;
      }

      a {
        position: relative;
        color: white;
        text-decoration: none;
      }

      a::after {
        content: "";

        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;

        height: 0.35em;

        z-index: -1;

        transition: 0.2s;
      }

      a:hover::after {
        height: 100%;
      }

      .green::after {
        background: var(--green);
      }

      footer {
        position: fixed;

        bottom: 20px;
        left: 10vw;

        color: rgba(255, 255, 255, 0.5);

        font-size: 0.85rem;
        font-weight: 300;
      }

      footer a {
        color: white !important;
      }

      #inputLine {
        display: none;
      }

      #userInput {
        background: transparent;
        border: none;
        outline: none;
        color: white;
        font: inherit;
        width: 100%;
      }

      #userInput::placeholder {
        color: rgba(255, 255, 255, 0.4);
      }

      #line3 {
        max-width: 16em;
        overflow-wrap: break-word;
      }
    </style>
  </head>

  <body>
    <main>
      <h1><span id="text"></span><span class="cursor"></span></h1>

      <p>
        <span id="line1"></span>
        <a
          class="green"
          href="https://www.linkedin.com/in/aryan-kalra-5b0920249/"
          target="_blank"
          ><span id="name"></span></a
        ><span id="dot"></span>
      </p>

      <p id="line2"></p>

      <p id="line3" contenteditable="false"><span id="fixedText"></span></p>

      <p id="inputLine">
        <input
          id="userInput"
          type="text"
          placeholder="Type here..."
          autocomplete="off"
        />
      </p>
    </main>

    <footer>
      Created 2023. Last updated 2026.
      <a
        href="version.html"
        target="_blank"
        style="color: white; text-decoration: none; font-weight: bold"
      >
        Version 1.0
      </a>
    </footer>

    <script>
      const lines = [
        { id: "text", text: "Hi," },
        { id: "line1", text: "My name is " },
        { id: "name", text: "Aryan" },
        { id: "dot", text: "." },
        { id: "line2", text: "I have a degree in computer science." },
        { id: "fixedText", text: "That's basically it." },
      ];

      let line = 0;
      let char = 0;
      let typingEnabled = false;

      const cursor = document.querySelector(".cursor");

      function type() {
        const output = document.getElementById(lines[line].id);

        if (char < lines[line].text.length) {
          output.textContent += lines[line].text[char];
          output.appendChild(cursor);

          char++;
          setTimeout(type, lines[line].id === "dot" ? 0 : 40);
        } else {
          line++;
          char = 0;

          if (line < lines.length) {
            setTimeout(
              () => {
                document.getElementById(lines[line].id).appendChild(cursor);
                type();
              },
              lines[line].id === "dot" ? 0 : 700,
            );
          } else {
            document.getElementById("line3").appendChild(cursor);
            typingEnabled = true;
          }
        }
      }

      document.addEventListener("keydown", (e) => {
        if (!typingEnabled) return;

        const output = document.getElementById("line3");
        const fixedText = "That's basically it.";
        const selection = window.getSelection();

        // Delete highlighted text
        if (e.key === "Backspace" && selection.toString().length > 0) {
          e.preventDefault();

          cursor.remove();

          const range = selection.getRangeAt(0);

          // Prevent deleting the fixed text
          const fixedNode = output.firstChild;

          if (
            fixedNode &&
            range.startContainer === fixedNode &&
            range.startOffset < fixedText.length
          ) {
            range.setStart(fixedNode, fixedText.length);
          }

          range.deleteContents();

          selection.removeAllRanges();

          // Keep cursor where deletion happened
          range.collapse(true);
          range.insertNode(cursor);

          return;
        }

        // Normal backspace
        if (e.key === "Backspace") {
          e.preventDefault();

          cursor.remove();

          let previous = output.lastChild;

          // Remove line break first
          if (previous && previous.nodeName === "BR") {
            previous.remove();

            output.appendChild(cursor);
            return;
          }

          // Only delete user-entered text
          if (previous && previous.nodeType === Node.TEXT_NODE) {
            let text = output.textContent;

            if (text.length > fixedText.length) {
              previous.textContent = previous.textContent.slice(0, -1);

              if (previous.textContent.length === 0) {
                previous.remove();
              }
            }
          }

          output.appendChild(cursor);

          return;
        }

        // Enter = new line
        if (e.key === "Enter") {
          e.preventDefault();

          cursor.remove();

          output.appendChild(document.createElement("br"));

          output.appendChild(cursor);

          return;
        }

        // Typing
        if (e.key.length === 1) {
          cursor.remove();

          output.appendChild(document.createTextNode(e.key));

          output.appendChild(cursor);
        }
      });

      setTimeout(type, 500);
    </script>
  </body>
</html>
